<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate AI Calculator 700+</title>
<style>
/* ------------------ Neon Base ------------------ */
body {
  margin:0; padding:0; font-family:Arial,sans-serif;
  background:#01031a; color:#00f0ff; text-align:center;
}
h1,h2,h3{ text-shadow:0 0 15px #00f0ff; }
button {
  background:#01031a; color:#00f0ff; border:2px solid #00f0ff;
  border-radius:12px; padding:8px 18px; margin:5px; cursor:pointer;
  font-weight:bold; transition:0.3s;
}
button:hover {
  background:#00f0ff; color:#01031a; box-shadow:0 0 20px #00f0ff;
}
input {
  margin:8px; padding:8px; border-radius:10px; border:2px solid #00f0ff;
  width:280px; background:#01031a; color:#00f0ff; font-size:16px;
}
#buttons {margin:10px;}
#canvasBox {margin:10px auto; width:400px; height:300px; border:2px solid #00f0ff; border-radius:12px;}
#startScreen {margin-top:100px;}
#result,#steps,#xp {margin:5px; font-weight:bold; text-shadow:0 0 8px #00f0ff;}
/* Neon Gradient Background for buttons container */
.topBtns {margin:10px; padding:10px; border-radius:12px;
background: linear-gradient(90deg, #00f0ff 0%, #ff00ff 100%);
box-shadow:0 0 20px #00f0ff;}
.topBtns button {border:none; background:transparent; color:white; font-weight:bold;}
</style>
</head>
<body>

<div id="startScreen">
<h1>☢️ Ultimate AI Calculator</h1>
<p>Click START to explore Math, Physics, 3D, Atoms & Puzzles!</p>
<button id="startBtn">START</button>
</div>

<div id="app">
<div class="topBtns">
<button onclick="setMode('math')">Math</button>
<button onclick="setMode('physics')">Physics</button>
<button onclick="setMode('3d')">3D Shapes</button>
<button onclick="setMode('atoms')">Atoms</button>
<button onclick="setMode('puzzle')">Puzzle</button>
</div>

<input id="input" placeholder="Enter calculation or choose a button" />
<div id="buttons"></div>
<div id="canvasBox"></div>
<button onclick="calculate()">Calculate</button>

<p id="result"></p>
<p id="steps"></p>
<p id="xp">XP: 0 | Level: 1</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
let mode="",xp=0,level=1;
document.getElementById("startBtn").onclick=function(){
document.getElementById("startScreen").style.display="none";
document.getElementById("app").style.display="block";
}

function setMode(m){
  mode=m; document.getElementById("buttons").innerHTML="";
  document.getElementById("canvasBox").innerHTML="";
  if(m==="math"){
    addBtn("Plus","+"); addBtn("Minus","-"); addBtn("Times","*"); addBtn("Divide","/");
    addBtn("Percentage","/100"); addBtn("Sin","sin()"); addBtn("Cos","cos()");
    addBtn("Tan","tan()"); addBtn("Log","log()"); addBtn("Ln","ln()"); addBtn("Abs","abs()");
  }
  else if(m==="physics"){
    addBtn("Force","force"); addBtn("Mass","mass"); addBtn("Acceleration","accel");
    addBtn("Velocity","vel"); addBtn("Energy","energy"); addBtn("Pressure","pressure");
    addBtn("Density","density"); addBtn("Kinetic Energy","kinetic");
    addBtn("Temp","temp"); addBtn("Work","work"); addBtn("Momentum","momentum");
    addBtn("Power","power"); addBtn("Gravity","gravity"); addBtn("Volume","volume");
    addBtn("Area","area"); addBtn("Speed","speed");
  }
  else if(m==="3d"){
    addBtn("Cube","cube"); addBtn("Sphere","sphere"); addBtn("Cylinder","cylinder");
    addBtn("Cone","cone"); addBtn("Pyramid","pyramid"); addBtn("Triangular Prism","triPrism");
  }
  else if(m==="atoms"){
    addBtn("Solid","solid"); addBtn("Liquid","liquid"); addBtn("Gas","gas"); addBtn("Plasma","plasma");
  }
  else if(m==="puzzle"){
    addBtn("Puzzle 1","puzzle1"); addBtn("Puzzle 2","puzzle2"); addBtn("Puzzle 3","puzzle3"); addBtn("Puzzle 4","puzzle4");
  }
}

function addBtn(name,value){
  let b=document.createElement("button");
  b.innerText=name;
  b.onclick=function(){document.getElementById("input").value=value; if(mode==="3d") draw3D(value);}
  document.getElementById("buttons").appendChild(b);
}

function calculate(){
  let input=document.getElementById("input").value;
  let result="",stepsTxt="";
  try{
    if(mode==="math"){
      let val=eval(input.replace("sin","Math.sin").replace("cos","Math.cos").replace("tan","Math.tan")
      .replace("log","Math.log10").replace("ln","Math.log").replace("abs","Math.abs"));
      result=val; stepsTxt=input+" → "+val; xp+=10;
    }
    else if(mode==="physics"){
      if(input.includes("force")){
        let f=10,m=5; let a=f/m; result="Acceleration="+a; stepsTxt="acceleration=force/mass"; xp+=10;
      } else result="Physics result"; xp+=5;
    }
    else result="Use buttons for 3D, Atoms, or Puzzle"; xp+=2;
  }catch(e){result="Error";}
  document.getElementById("result").innerText=result;
  document.getElementById("steps").innerText=stepsTxt;
  updateXP();
}

function updateXP(){if(xp>=level*100){level++; xp=0;} document.getElementById("xp").innerText="XP: "+xp+" | Level: "+level;}

function draw3D(shape){
  document.getElementById("canvasBox").innerHTML="";
  let width=400,height=300;
  let scene=new THREE.Scene();
  let camera=new THREE.PerspectiveCamera(75,width/height,0.1,1000);
  let renderer=new THREE.WebGLRenderer(); renderer.setSize(width,height);
  document.getElementById("canvasBox").appendChild(renderer.domElement);
  let geometry,material=new THREE.MeshNormalMaterial();
  if(shape==="cube") geometry=new THREE.BoxGeometry(1,1,1);
  else if(shape==="sphere") geometry=new THREE.SphereGeometry(1,32,32);
  else if(shape==="cylinder") geometry=new THREE.CylinderGeometry(1,1,2,32);
  else if(shape==="cone") geometry=new THREE.ConeGeometry(1,2,32);
  else if(shape==="pyramid") geometry=new THREE.ConeGeometry(1,2,4);
  else if(shape==="triPrism") geometry=new THREE.CylinderGeometry(1,1,2,3);
  let mesh=new THREE.Mesh(geometry,material); scene.add(mesh); camera.position.z=5;
  function animate(){requestAnimationFrame(animate); mesh.rotation.x+=0.01; mesh.rotation.y+=0.01; renderer.render(scene,camera);}
  animate();
}
</script>
</body>
</html>
